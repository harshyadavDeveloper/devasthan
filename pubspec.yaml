name: devasthan
description: Your personal sacred space — mandir builder, daily aarti & bhajans.
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # Navigation
  go_router: ^13.0.0

  # State management
  provider: ^6.1.2

  # Local storage (mandir save, streak, prefs)
  hive_flutter: ^1.1.0
  hive: ^2.2.3

  # Audio player (Phase 4)
  just_audio: ^0.9.36

  # Local notifications / alarm (Phase 5)
  flutter_local_notifications: ^17.0.0
  timezone: ^0.9.2

  # Utilities
  intl: ^0.19.0
  flutter_launcher_icons: ^0.14.4
  rename_app: ^1.6.5
  flutter_native_splash: ^2.4.7

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.6

flutter:
  uses-material-design: true

  assets:
    - assets/audio/
    - assets/images/

  fonts:
    - family: Poppins
      fonts:
        - asset: assets/fonts/Poppins-Regular.ttf
        - asset: assets/fonts/Poppins-Medium.ttf
          weight: 500
        - asset: assets/fonts/Poppins-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Poppins-Bold.ttf
          weight: 700

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/devasthan_app_icon.png"
  adaptive_icon_background: "#1A0A00"
  adaptive_icon_foreground: "assets/images/devasthan_app_icon.png"
  min_sdk_android: 21

flutter_native_splash:
  color: "#1A0A00"
  image: assets/images/splash.png
  android_12:
    color: "#1A0A00"
    image: assets/images/splash.png
    icon_background_color: "#1A0A00"
  fullscreen: true
