name: devasthan
description: Your personal sacred space — mandir builder, daily aarti & bhajans.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Navigation
  go_router: ^13.0.0

  # State management
  provider: ^6.1.2

  # Local storage (mandir save, streak, prefs)
  hive_flutter: ^1.1.0
  hive: ^2.2.3

  # Audio player (Phase 4)
  just_audio: ^0.9.36

  # Local notifications / alarm (Phase 5)
  flutter_local_notifications: ^17.0.0
  timezone: ^0.9.2

  # Utilities
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.6

flutter:
  uses-material-design: true

  assets:
    - assets/audio/
    - assets/images/

  fonts:
    - family: Poppins
      fonts:
        - asset: assets/fonts/Poppins-Regular.ttf
        - asset: assets/fonts/Poppins-Medium.ttf
          weight: 500
        - asset: assets/fonts/Poppins-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Poppins-Bold.ttf
          weight: 700